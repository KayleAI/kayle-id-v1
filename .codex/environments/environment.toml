# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "kayle-id"

[setup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:-.}"

bun install --frozen-lockfile
bun run env:setup

if ! command -v capnpc >/dev/null 2>&1; then
  echo "capnpc is required for Kayle ID worktrees. Install capnproto, then rerun: bun run capnp:generate:ts" >&2
  exit 1
fi

bun run capnp:generate:ts

if [ ! -f apps/api/.env.test ]; then
  cp .env.test.example apps/api/.env.test
fi
'''

[cleanup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:-.}"

rm -rf .turbo .wrangler .wrangler-out temp tmp
rm -rf packages/capnp/generated
rm -rf apps/api/.wrangler apps/api/.wrangler-out
rm -rf apps/platform/.wrangler apps/platform/.wrangler-out
rm -rf apps/verify/.wrangler apps/verify/.wrangler-out
rm -rf apps/biometric-verifier/.wrangler apps/biometric-verifier/.wrangler-out
rm -rf apps/ios/.build apps/ios/.swiftpm apps/ios/.derived-data-device apps/ios/.derived-data apps/ios/DerivedData apps/ios/build
rm -f apps/api/.env.test apps/platform/.env
'''

[[actions]]
name = "Run Swift Tests"
icon = "test"
command = '''
cd apps/ios
swift test
'''
platform = "darwin"

[[actions]]
name = "Tests, Typecheck, and Linting"
