name: Bug report
description: Report something that's broken, regressed, or behaves differently from documented behaviour.
title: "[bug]: "
labels: ["bug", "triage"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please fill in every section — incomplete reports get tagged `needs-info` and are closed after 14 days of silence.

        For security issues, **do not open a public issue.** Email `security@kayle.id` instead.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing the bug.
      placeholder: "When I do X, I expect Y, but Z happens instead."
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit SHA
      description: The Kayle ID version (`package.json#version`) or the commit you're running.
      placeholder: "1.3.6"
    validations:
      required: true

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      description: Which part of the stack does the bug live in?
      options:
        - API (apps/api)
        - Platform (apps/platform)
        - Verify web app (apps/verify)
        - Biometric verifier (infra/biometric-verifier)
        - iOS app (apps/ios)
        - Database / migrations
        - Local dev tooling / scripts
        - CI / release workflow
        - Documentation (docs/)
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal reproducible steps. Include the request you made or the command you ran.
      placeholder: |
        1. Run `bun run env:setup`
        2. Run `bun run services:start`
        3. Run `bun run dev`
        4. Open https://localhost:3000/sign-in
        5. Submit an email — observe error in API logs
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include logs, stack traces, or screenshots. **Redact any PII** before pasting.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Bun version, Docker version, anything else relevant. Run `bun --version && docker --version`.
      render: text
    validations:
      required: false

  - type: checkboxes
    id: prerequisites
    attributes:
      label: Prerequisites
      options:
        - label: I have searched [existing issues](https://github.com/KayleAI/kayle-id/issues) and confirmed this isn't a duplicate.
          required: true
        - label: I am not reporting a security vulnerability (those go to security@kayle.id).
          required: true
