name: Check required workflows
description: Check that required workflows completed successfully for one commit.

inputs:
  current-workflow-conclusion:
    description: Conclusion from the workflow_run event that triggered this check.
    required: true
  current-workflow-path:
    description: Workflow file path from the workflow_run event that triggered this check.
    required: true
  github-token:
    description: GitHub token with actions:read permission.
    required: true
  head-branch:
    description: Branch that produced the workflow runs.
    required: true
  head-sha:
    description: Commit SHA that must have successful workflow runs.
    required: true
  required-workflows:
    description: Newline-separated workflow file names to check.
    required: true
  workflow-event:
    description: Event that produced the workflow runs.
    required: true

outputs:
  ready:
    description: Whether every required workflow completed successfully.
    value: ${{ steps.check.outputs.ready }}

runs:
  using: composite
  steps:
    - name: Check workflow conclusions
      id: check
      shell: bash
      env:
        CURRENT_WORKFLOW_CONCLUSION: ${{ inputs.current-workflow-conclusion }}
        CURRENT_WORKFLOW_PATH: ${{ inputs.current-workflow-path }}
        GH_TOKEN: ${{ inputs.github-token }}
        HEAD_BRANCH: ${{ inputs.head-branch }}
        HEAD_SHA: ${{ inputs.head-sha }}
        REQUIRED_WORKFLOWS: ${{ inputs.required-workflows }}
        WORKFLOW_EVENT: ${{ inputs.workflow-event }}
      run: |
        set -euo pipefail

        ready="true"

        while IFS= read -r workflow_id || [[ -n "${workflow_id}" ]]; do
          if [[ -z "${workflow_id}" ]]; then
            continue
          fi

          if [[ "${CURRENT_WORKFLOW_PATH}" == ".github/workflows/${workflow_id}" && \
            "${CURRENT_WORKFLOW_CONCLUSION}" == "success" ]]; then
            echo "${workflow_id}: status=completed conclusion=success url=current workflow_run event"
            continue
          fi

          response="$(
            gh api \
              --method GET \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/${GITHUB_REPOSITORY}/actions/workflows/${workflow_id}/runs" \
              -f branch="${HEAD_BRANCH}" \
              -f event="${WORKFLOW_EVENT}" \
              -f head_sha="${HEAD_SHA}" \
              -f per_page=10
          )"

          workflow_result="$(
            printf '%s' "${response}" | ruby -rjson -e '
              payload = JSON.parse(STDIN.read)
              run = payload.fetch("workflow_runs").find do |candidate|
                candidate.fetch("head_sha") == ENV.fetch("HEAD_SHA") &&
                  candidate.fetch("head_branch") == ENV.fetch("HEAD_BRANCH") &&
                  candidate.fetch("event") == ENV.fetch("WORKFLOW_EVENT")
              end

              if run.nil?
                puts "missing"
              else
                puts [
                  run.fetch("status"),
                  run["conclusion"] || "none",
                  run.fetch("html_url"),
                ].join("\t")
              end
            '
          )"

          if [[ "${workflow_result}" == "missing" ]]; then
            echo "${workflow_id} has no ${WORKFLOW_EVENT} run for ${HEAD_BRANCH}@${HEAD_SHA} yet."
            ready="false"
            continue
          fi

          IFS=$'\t' read -r status conclusion run_url <<< "${workflow_result}"
          echo "${workflow_id}: status=${status} conclusion=${conclusion:-none} url=${run_url}"

          if [[ "${status}" != "completed" || "${conclusion}" != "success" ]]; then
            ready="false"
          fi
        done <<< "${REQUIRED_WORKFLOWS}"

        echo "ready=${ready}" >> "${GITHUB_OUTPUT}"
