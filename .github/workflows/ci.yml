name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: ripgrep

      - name: Run repository validation
        run: bun run lint

      - name: Verify iOS string catalog is up to date with TS source
        run: bun run --cwd packages/translations verify:ios

  test-api:
    name: Test API Integration
    runs-on: ubuntu-latest
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kayle-id
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 6432
      NODE_ENV: test
      AUTH_SECRET: YrI9mdtghMK4xwI9n9W7npc9rcujcB6X

    services:
      postgres:
        image: postgres:17.7@sha256:030da09481c3876b71a7e49738a932e1c18c398201a1e4ccfdbff1e5a541215b
        ports:
          - 6432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: kayle-id
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine@sha256:b1addbe72465a718643cff9e60a58e6df1841e29d6d7d60c9a85d8d72f08d1a7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      # Upstash-compatible HTTP shim. The auth/Redis client (`@upstash/redis`)
      # speaks REST, not the Redis wire protocol, so tests need this in front
      # of the redis service. Token + port mirror `.env.test.example`.
      srh:
        image: hiett/serverless-redis-http@sha256:01d66211581ebd552e07292e3b73f1f475e52c48aa725049809aa09a7ba23238
        ports:
          - 8079:80
        env:
          SRH_MODE: env
          SRH_TOKEN: a-super-secret-token
          SRH_CONNECTION_STRING: redis://redis:6379

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          apt-packages: unzip curl ripgrep
          generate-capnp-ts: "true"

      - name: Export DATABASE_URL
        run: |
          echo "DATABASE_URL=postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:$POSTGRES_PORT/$POSTGRES_DB" >> "$GITHUB_ENV"

      - name: Migrate + seed database
        run: bun run db:setup

      - name: Start API, run tests, and stop
        run: |
          set -euo pipefail

          cleanup() {
            local exit_code="$1"
            trap - EXIT
            set +e

            if [[ "${exit_code}" -ne 0 ]]; then
              echo "Face matcher log:"
              if [[ -f /tmp/face-matcher.log ]]; then
                cat /tmp/face-matcher.log
              fi
              echo "API log:"
              if [[ -f /tmp/api.log ]]; then
                cat /tmp/api.log
              fi
            fi

            if [[ -n "${SERVER_PID:-}" ]]; then
              echo "Stopping API server with PID ${SERVER_PID}"
              kill "${SERVER_PID}" 2>/dev/null || true
              wait "${SERVER_PID}" 2>/dev/null || true
            fi

            if [[ -n "${MATCHER_PID:-}" ]]; then
              echo "Stopping face matcher with PID ${MATCHER_PID}"
              kill "${MATCHER_PID}" 2>/dev/null || true
              wait "${MATCHER_PID}" 2>/dev/null || true
            fi

            exit "${exit_code}"
          }

          wait_for_matcher() {
            local start_time
            start_time="$(date +%s)"

            while true; do
              if ! kill -0 "${MATCHER_PID}" 2>/dev/null; then
                echo "Face matcher exited before becoming healthy."
                return 1
              fi

              if response="$(curl -fsS -m 5 http://127.0.0.1:8788/health 2>/dev/null)" && \
                python3 -c 'import json,sys; payload=json.loads(sys.stdin.read()); raise SystemExit(0 if payload.get("data", {}).get("ready") is True else 1)' <<<"${response}"; then
                return 0
              fi

              if [[ "$(($(date +%s) - start_time))" -ge 60 ]]; then
                echo "Face matcher did not become healthy within 60 seconds."
                return 1
              fi

              sleep 1
            done
          }

          wait_for_api() {
            local start_time
            start_time="$(date +%s)"
            local last_progress=0

            while true; do
              if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
                echo "API server exited before becoming ready."
                return 1
              fi

              if curl -fsS -m 5 http://127.0.0.1:8787/ >/dev/null 2>&1; then
                return 0
              fi

              local elapsed=$(($(date +%s) - start_time))
              if [[ "${elapsed}" -ge 120 ]]; then
                echo "API server did not become ready within 120 seconds."
                return 1
              fi

              if [[ "$((elapsed - last_progress))" -ge 30 ]]; then
                echo "Still waiting for API after ${elapsed}s; last 20 lines of API log:"
                tail -n 20 /tmp/api.log || true
                last_progress="${elapsed}"
              fi

              sleep 1
            done
          }

          trap 'cleanup $?' EXIT

          (
            cd infra/face-matcher
            bunx wrangler dev --env-file ../../.env.test.example --local --ip 127.0.0.1 --port 8788 --inspector-port 9232
          ) > /tmp/face-matcher.log 2>&1 &
          MATCHER_PID=$!
          echo "Face matcher started with PID ${MATCHER_PID}"
          wait_for_matcher

          # Bun auto-loads `apps/api/.env.test` into the test process when
          # NODE_ENV=test, and wrangler dev needs the same vars — copy the
          # committed example into the location both expect.
          cp ./.env.test.example ./apps/api/.env.test

          (
            cd apps/api
            bunx wrangler dev --env-file ./.env.test --local --ip 127.0.0.1 --port 8787 --inspector-port 9230 --env test
          ) > /tmp/api.log 2>&1 &
          SERVER_PID=$!
          echo "API server started with PID ${SERVER_PID}"
          wait_for_api

          (
            cd apps/api
            bun test
          )

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Test face matcher
        working-directory: infra/face-matcher
        run: bun run test

      - name: Test translations
        working-directory: packages/translations
        run: bun run test

      - name: Test platform
        working-directory: apps/platform
        run: bun run test

      - name: Test verify
        working-directory: apps/verify
        run: bun run test

  build-workers:
    name: Build Worker (${{ matrix.worker }})
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production

    strategy:
      fail-fast: false
      matrix:
        include:
          - worker: face-matcher
            working-directory: infra/face-matcher
            generate-capnp: "false"
            pre-build: ""
            wrangler-args: --env production
          - worker: api
            working-directory: apps/api
            generate-capnp: "true"
            pre-build: ""
            wrangler-args: --minify --env production
          - worker: platform
            working-directory: apps/platform
            generate-capnp: "false"
            pre-build: bun run build
            wrangler-args: --minify
          - worker: verify
            working-directory: apps/verify
            generate-capnp: "true"
            pre-build: bun run build
            wrangler-args: --minify --env production

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: ${{ matrix.generate-capnp }}

      - name: Pre-build (vite)
        if: matrix.pre-build != ''
        working-directory: ${{ matrix.working-directory }}
        run: ${{ matrix.pre-build }}

      - name: Wrangler dry-run deploy
        working-directory: ${{ matrix.working-directory }}
        run: bunx wrangler deploy --dry-run --outdir .wrangler-out ${{ matrix.wrangler-args }}
