name: Release Staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-staging
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  guard:
    name: Guard Staging Deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging' &&
        github.event.workflow_run.event == 'push'
      )
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}

    steps:
      - name: Reject manual run from non-staging ref
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/staging'
        run: |
          echo "Manual staging releases must run from the staging branch. Received ${GITHUB_REF}." >&2
          exit 1

      - name: Resolve head SHA
        id: context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "head_sha=${{ github.sha }}" >> "${GITHUB_OUTPUT}"
          fi

  migrate_database:
    name: Migrate Staging Database
    runs-on: ubuntu-latest
    needs: guard

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Apply Drizzle migrations to staging Postgres
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: bun run db:migrate

  deploy_biometric_verifier:
    name: Deploy Biometric Verifier (staging)
    runs-on: ubuntu-latest
    needs: guard

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Deploy biometric verifier to staging
        working-directory: apps/biometric-verifier
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --env staging

  deploy_api:
    name: Deploy API (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - migrate_database
      - deploy_biometric_verifier

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy API to staging
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging

  deploy_platform:
    name: Deploy Platform (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - deploy_api

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Build platform bundle (staging)
        working-directory: apps/platform
        env:
          CLOUDFLARE_ENV: staging
          NODE_ENV: production
        run: bun run build

      - name: Deploy platform to staging
        working-directory: apps/platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging

  deploy_verify:
    name: Deploy Verify (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - deploy_api

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Build verify bundle (staging)
        working-directory: apps/verify
        env:
          CLOUDFLARE_ENV: staging
          NODE_ENV: production
        run: bun run build

      - name: Deploy verify to staging
        working-directory: apps/verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging
