name: Release Staging

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-staging
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  guard:
    name: Guard Staging Deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging' &&
        github.event.workflow_run.event == 'push'
      )
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      face_matcher: ${{ steps.changed.outputs.face_matcher }}
      api: ${{ steps.changed.outputs.api }}
      platform: ${{ steps.changed.outputs.platform }}
      verify: ${{ steps.changed.outputs.verify }}

    steps:
      - name: Reject manual run from non-staging ref
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/staging'
        run: |
          echo "Manual staging releases must run from the staging branch. Received ${GITHUB_REF}." >&2
          exit 1

      - name: Resolve head SHA
        id: context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "head_sha=${{ github.sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ steps.context.outputs.head_sha }}

      - name: Detect changed worker scopes
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]] || ! git rev-parse HEAD^1 >/dev/null 2>&1; then
            {
              echo "face_matcher=true"
              echo "api=true"
              echo "platform=true"
              echo "verify=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          base_ref="$(git rev-parse HEAD^1)"

          has_changes() {
            if git diff --quiet "${base_ref}" HEAD -- "$@"; then
              echo "false"
            else
              echo "true"
            fi
          }

          {
            echo "face_matcher=$(has_changes \
              bun.lock \
              package.json \
              infra/face-matcher \
              packages/config)"
            echo "api=$(has_changes \
              bun.lock \
              package.json \
              apps/api \
              packages/auth \
              packages/capnp \
              packages/config \
              packages/database)"
            echo "platform=$(has_changes \
              bun.lock \
              package.json \
              apps/platform \
              packages/auth \
              packages/config)"
            echo "verify=$(has_changes \
              bun.lock \
              package.json \
              apps/verify \
              packages/capnp \
              packages/config)"
          } >> "${GITHUB_OUTPUT}"

  migrate_database:
    name: Migrate Staging Database
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.api == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Apply Drizzle migrations to staging Postgres
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: bun run db:migrate

  deploy_face_matcher:
    name: Deploy Face Matcher (staging)
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.face_matcher == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Deploy face matcher to staging
        working-directory: infra/face-matcher
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --env staging

  deploy_api:
    name: Deploy API (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - migrate_database
      - deploy_face_matcher
    if: >-
      always() &&
      needs.guard.outputs.api == 'true' &&
      needs.migrate_database.result == 'success' &&
      (
        needs.deploy_face_matcher.result == 'success' ||
        needs.deploy_face_matcher.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy API to staging
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging

  deploy_platform:
    name: Deploy Platform (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - deploy_api
    if: >-
      always() &&
      needs.guard.outputs.platform == 'true' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Build platform bundle (staging)
        working-directory: apps/platform
        env:
          CLOUDFLARE_ENV: staging
          NODE_ENV: production
        run: bun run build

      - name: Deploy platform to staging
        working-directory: apps/platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging

  deploy_verify:
    name: Deploy Verify (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - deploy_api
    if: >-
      always() &&
      needs.guard.outputs.verify == 'true' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Build verify bundle (staging)
        working-directory: apps/verify
        env:
          CLOUDFLARE_ENV: staging
          NODE_ENV: production
        run: bun run build

      - name: Deploy verify to staging
        working-directory: apps/verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging
