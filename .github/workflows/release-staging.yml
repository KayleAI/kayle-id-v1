name: Release Staging

on:
  workflow_run:
    workflows:
      - Validate
      - Build
      - Test
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: release-staging
  cancel-in-progress: false

env:
  CI: "true"

jobs:
  guard:
    name: Guard Staging Deploy
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'staging' &&
        github.event.workflow_run.event == 'push'
      )
    outputs:
      head_sha: ${{ steps.context.outputs.head_sha }}
      release_ready: ${{ steps.manual.outputs.ready || steps.required.outputs.ready }}

    steps:
      - name: Reject manual run from non-staging ref
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/staging'
        run: |
          echo "Manual staging releases must run from the staging branch. Received ${GITHUB_REF}." >&2
          exit 1

      - name: Resolve head SHA
        id: context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            echo "head_sha=${{ github.event.workflow_run.head_sha }}" >> "${GITHUB_OUTPUT}"
          else
            echo "head_sha=${{ github.sha }}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Mark manual dispatch ready
        id: manual
        if: github.event_name == 'workflow_dispatch'
        run: echo "ready=true" >> "${GITHUB_OUTPUT}"

      - name: Check out repository code
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ steps.context.outputs.head_sha }}

      - name: Check required workflow results
        id: required
        if: github.event_name == 'workflow_run'
        uses: ./.github/actions/check-required-workflows
        with:
          current-workflow-conclusion: ${{ github.event.workflow_run.conclusion }}
          current-workflow-path: ${{ github.event.workflow_run.path }}
          github-token: ${{ github.token }}
          head-branch: ${{ github.event.workflow_run.head_branch }}
          head-sha: ${{ steps.context.outputs.head_sha }}
          workflow-event: ${{ github.event.workflow_run.event }}
          required-workflows: |
            validate.yml
            build.yml
            test.yml

  detect_changes:
    name: Detect Staging Changes
    runs-on: ubuntu-latest
    needs: guard
    if: needs.guard.outputs.release_ready == 'true'
    outputs:
      api: ${{ steps.worker_changes.outputs.api_changed }}
      biometric_verifier: ${{ steps.worker_changes.outputs.biometric_verifier_changed }}
      platform: ${{ steps.worker_changes.outputs.platform_changed }}
      verify: ${{ steps.worker_changes.outputs.verify_changed }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Detect changed staging apps
        id: worker_changes
        uses: ./.github/actions/detect-worker-changes
        with:
          force-all: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}

  migrate_database:
    name: Migrate Staging Database
    runs-on: ubuntu-latest
    needs:
      - guard
      - detect_changes
    if: >-
      needs.guard.outputs.release_ready == 'true' &&
      needs.detect_changes.outputs.api == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Apply Drizzle migrations to staging Postgres
        working-directory: packages/database
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: bun run db:migrate

  deploy_biometric_verifier:
    name: Deploy Biometric Verifier (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - detect_changes
    if: >-
      needs.guard.outputs.release_ready == 'true' &&
      needs.detect_changes.outputs.biometric_verifier == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Deploy biometric verifier to staging
        working-directory: apps/biometric-verifier
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --env staging

  deploy_api:
    name: Deploy API (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - detect_changes
      - migrate_database
      - deploy_biometric_verifier
    if: >-
      always() &&
      needs.guard.outputs.release_ready == 'true' &&
      needs.detect_changes.outputs.api == 'true' &&
      needs.migrate_database.result == 'success' &&
      (
        needs.deploy_biometric_verifier.result == 'success' ||
        needs.deploy_biometric_verifier.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy API to staging
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging

  deploy_platform:
    name: Deploy Platform (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - detect_changes
      - deploy_api
    if: >-
      always() &&
      needs.guard.outputs.release_ready == 'true' &&
      needs.detect_changes.outputs.platform == 'true' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Build platform bundle (staging)
        working-directory: apps/platform
        env:
          CLOUDFLARE_ENV: staging
          NODE_ENV: production
        run: bun run build

      - name: Deploy platform to staging
        working-directory: apps/platform
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging

  deploy_verify:
    name: Deploy Verify (staging)
    runs-on: ubuntu-latest
    needs:
      - guard
      - detect_changes
      - deploy_api
    if: >-
      always() &&
      needs.guard.outputs.release_ready == 'true' &&
      needs.detect_changes.outputs.verify == 'true' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.guard.outputs.head_sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Build verify bundle (staging)
        working-directory: apps/verify
        env:
          CLOUDFLARE_ENV: staging
          NODE_ENV: production
        run: bun run build

      - name: Deploy verify to staging
        working-directory: apps/verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler deploy --minify --env staging
