name: Release

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && 'release-production' || format('release-preview-{0}', github.run_id) }}
  cancel-in-progress: false

env:
  CI: "true"
  RELEASE_TAG_PREFIX: v
  APP_BUNDLE_ID: kayle.id
  APP_PROJECT_PATH: apps/ios/Kayle ID.xcodeproj
  APP_SCHEME: Kayle ID
  APP_TEAM_ID: K667TL7H29
  CAPNPROTO_SWIFT_REPOSITORY: https://github.com/arsenstorm/capnproto-swift
  CAPNPROTO_SWIFT_REF: 00411f6c44fd68d5ad7468f03e5bcc29a9350c7b
  REQUIRED_IOS_SDK_MAJOR: "26"
  REQUIRED_XCODE_MAJOR: "26"

jobs:
  detect_release:
    name: Detect Release
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )
    outputs:
      app_version: ${{ steps.context.outputs.app_version }}
      force_full_release: ${{ steps.context.outputs.force_full_release }}
      release_allowed: ${{ steps.context.outputs.release_allowed }}
      release_tag: ${{ steps.context.outputs.release_tag }}
      face_matcher_changed: ${{ steps.context.outputs.face_matcher_changed }}
      api_changed: ${{ steps.context.outputs.api_changed }}
      platform_changed: ${{ steps.context.outputs.platform_changed }}
      verify_changed: ${{ steps.context.outputs.verify_changed }}
      face_matcher: ${{ steps.context.outputs.face_matcher }}
      api: ${{ steps.context.outputs.api }}
      platform: ${{ steps.context.outputs.platform }}
      verify: ${{ steps.context.outputs.verify }}

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Restrict manual releases to main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "Manual releases must run from main. Received ${GITHUB_REF}." >&2
          exit 1

      - name: Detect release context
        id: context
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || '' }}
          WORKFLOW_EVENT: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.event || '' }}
        run: |
          set -euo pipefail

          app_version="$(node -p "require('./package.json').version")"

          if [[ -z "${app_version}" ]]; then
            echo "Unable to determine the root package version from package.json." >&2
            exit 1
          fi

          if [[ ! "${app_version}" =~ ^[0-9]+(\.[0-9]+){2}$ ]]; then
            echo "The root package version must be a numeric semver like 1.2.3. Received ${app_version}." >&2
            exit 1
          fi

          compare_versions() {
            local lhs="$1"
            local rhs="$2"
            local lhs_part
            local rhs_part
            local lhs_parts
            local rhs_parts
            local index
            local max_parts

            IFS=. read -r -a lhs_parts <<< "${lhs}"
            IFS=. read -r -a rhs_parts <<< "${rhs}"

            max_parts="${#lhs_parts[@]}"
            if (( ${#rhs_parts[@]} > max_parts )); then
              max_parts="${#rhs_parts[@]}"
            fi

            for (( index = 0; index < max_parts; index += 1 )); do
              lhs_part="${lhs_parts[index]:-0}"
              rhs_part="${rhs_parts[index]:-0}"

              if (( 10#${lhs_part} > 10#${rhs_part} )); then
                echo "newer"
                return 0
              fi

              if (( 10#${lhs_part} < 10#${rhs_part} )); then
                echo "older"
                return 0
              fi
            done

            echo "same"
          }

          release_tag="${RELEASE_TAG_PREFIX}${app_version}"
          release_allowed="false"
          force_full_release="false"
          is_main_push="false"

          if [[ "${WORKFLOW_EVENT}" == "push" && "${HEAD_BRANCH}" == "main" ]]; then
            is_main_push="true"
          fi

          if [[ "${is_main_push}" == "true" || "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            latest_release_tag="$(git tag --list "${RELEASE_TAG_PREFIX}*" --sort=-v:refname | head -n 1)"

            if [[ -z "${latest_release_tag}" ]]; then
              release_allowed="true"
            else
              if [[ ! "${latest_release_tag}" =~ ^${RELEASE_TAG_PREFIX}([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
                echo "Latest release tag ${latest_release_tag} does not match ${RELEASE_TAG_PREFIX}<version>." >&2
                exit 1
              fi

              released_version="${BASH_REMATCH[1]}"
              comparison="$(compare_versions "${app_version}" "${released_version}")"

              case "${comparison}" in
                newer)
                  release_allowed="true"
                  ;;
                same)
                  ;;
                older)
                  echo "Current package version ${app_version} is lower than last released version ${released_version}." >&2
                  exit 1
                  ;;
              esac
            fi
          fi

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            face_matcher_changed="true"
            api_changed="true"
            platform_changed="true"
            verify_changed="true"
          elif ! git rev-parse HEAD^1 >/dev/null 2>&1; then
            face_matcher_changed="true"
            api_changed="true"
            platform_changed="true"
            verify_changed="true"
          else
            base_ref="$(git rev-parse HEAD^1)"

            has_changes() {
              if git diff --quiet "${base_ref}" HEAD -- "$@"; then
                echo "false"
              else
                echo "true"
              fi
            }

            face_matcher_changed="$(has_changes \
              bun.lock \
              package.json \
              infra/face-matcher \
              packages/config)"
            api_changed="$(has_changes \
              bun.lock \
              package.json \
              apps/api \
              packages/auth \
              packages/capnp \
              packages/config \
              packages/database)"
            platform_changed="$(has_changes \
              bun.lock \
              package.json \
              apps/platform \
              packages/auth \
              packages/config)"
            verify_changed="$(has_changes \
              bun.lock \
              package.json \
              apps/verify \
              packages/capnp \
              packages/config)"
          fi

          face_matcher="${face_matcher_changed}"
          api="${api_changed}"
          platform="${platform_changed}"
          verify="${verify_changed}"

          if [[ "${release_allowed}" == "true" ]]; then
            force_full_release="true"
            face_matcher="true"
            api="true"
            platform="true"
            verify="true"
          fi

          {
            echo "app_version=${app_version}"
            echo "force_full_release=${force_full_release}"
            echo "release_allowed=${release_allowed}"
            echo "release_tag=${release_tag}"
            echo "face_matcher_changed=${face_matcher_changed}"
            echo "api_changed=${api_changed}"
            echo "platform_changed=${platform_changed}"
            echo "verify_changed=${verify_changed}"
            echo "face_matcher=${face_matcher}"
            echo "api=${api}"
            echo "platform=${platform}"
            echo "verify=${verify}"
          } >> "${GITHUB_OUTPUT}"

      - name: Summarize release decision
        run: |
          if [[ "${{ steps.context.outputs.release_allowed }}" == "true" ]]; then
            echo "Production release unlocked for version ${{ steps.context.outputs.app_version }}: workers will be rebuilt and the iOS App Store build will run."
          else
            echo "Running preview builds only. Production deployment remains locked until the root package version is newer than the latest published release tag."
          fi

  approve_production_release:
    name: Approve Production Release
    runs-on: ubuntu-latest
    needs: detect_release
    if: needs.detect_release.outputs.release_allowed == 'true'
    environment: production

    steps:
      - name: Record production approval
        run: echo "Production release approved."

  verify_app_store_agreements:
    name: Verify App Store agreements
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - approve_production_release
    if: needs.detect_release.outputs.release_allowed == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Check App Store Connect for pending agreements
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: bun ./scripts/check-app-store-agreements.ts

  preview_face_matcher:
    name: Preview Face Matcher
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - verify_app_store_agreements
    if: needs.detect_release.outputs.face_matcher == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Build preview face matcher worker bundle
        working-directory: infra/face-matcher
        run: bunx wrangler deploy --dry-run --outdir .wrangler-out --env production

      - name: Package face matcher deploy artifact
        id: package
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/worker-face-matcher-artifact"
          archive_path="${RUNNER_TEMP}/kayle-id-worker-face-matcher-${APP_VERSION}.tgz"

          node ./scripts/package-worker-deploy-artifact.mjs \
            --project-dir infra/face-matcher \
            --artifact-dir "${artifact_dir}" \
            --extra-path apps/api/public

          tar -C "${artifact_dir}" -czf "${archive_path}" .

          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload face matcher deploy artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: worker-face-matcher-package
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  preview_api:
    name: Preview API
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - verify_app_store_agreements
    if: needs.detect_release.outputs.api == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Deploy preview API worker bundle
        working-directory: apps/api
        run: bunx wrangler deploy --dry-run --outdir .wrangler-out --minify --env production

      - name: Package API deploy artifact
        id: package
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/worker-api-artifact"
          archive_path="${RUNNER_TEMP}/kayle-id-worker-api-${APP_VERSION}.tgz"

          node ./scripts/package-worker-deploy-artifact.mjs \
            --project-dir apps/api \
            --artifact-dir "${artifact_dir}"

          tar -C "${artifact_dir}" -czf "${archive_path}" .

          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload API deploy artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: worker-api-package
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  preview_platform:
    name: Preview Platform
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - verify_app_store_agreements
    if: needs.detect_release.outputs.platform == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Build platform worker bundle
        working-directory: apps/platform
        run: bun run build

      - name: Build preview platform worker bundle
        working-directory: apps/platform
        run: bunx wrangler deploy --dry-run --outdir .wrangler-out --minify

      - name: Package platform deploy artifact
        id: package
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/worker-platform-artifact"
          archive_path="${RUNNER_TEMP}/kayle-id-worker-platform-${APP_VERSION}.tgz"

          node ./scripts/package-worker-deploy-artifact.mjs \
            --project-dir apps/platform \
            --artifact-dir "${artifact_dir}"

          tar -C "${artifact_dir}" -czf "${archive_path}" .

          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload platform deploy artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: worker-platform-package
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  preview_verify:
    name: Preview Verify
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - verify_app_store_agreements
    if: needs.detect_release.outputs.verify == 'true'

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: "true"

      - name: Build verify worker bundle
        working-directory: apps/verify
        run: bun run build

      - name: Build preview verify worker bundle
        working-directory: apps/verify
        run: bunx wrangler deploy --dry-run --outdir .wrangler-out --minify --env production

      - name: Package verify deploy artifact
        id: package
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          artifact_dir="${RUNNER_TEMP}/worker-verify-artifact"
          archive_path="${RUNNER_TEMP}/kayle-id-worker-verify-${APP_VERSION}.tgz"

          node ./scripts/package-worker-deploy-artifact.mjs \
            --project-dir apps/verify \
            --artifact-dir "${artifact_dir}"

          tar -C "${artifact_dir}" -czf "${archive_path}" .

          echo "archive_path=${archive_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload verify deploy artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: worker-verify-package
          path: ${{ steps.package.outputs.archive_path }}
          if-no-files-found: error

  build_ios:
    name: Build iOS App Store
    runs-on: macos-15
    needs:
      - detect_release
      - verify_app_store_agreements
    if: needs.detect_release.outputs.release_allowed == 'true'
    timeout-minutes: 90

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Prepare capnproto-swift dependency
        env:
          CAPNPROTO_SWIFT_PATH: ${{ github.workspace }}/../../Work/capnproto-swift
        run: |
          set -euo pipefail

          if [[ -e "${CAPNPROTO_SWIFT_PATH}" ]]; then
            echo "Expected dependency path ${CAPNPROTO_SWIFT_PATH} already exists." >&2
            exit 1
          fi

          mkdir -p "$(dirname "${CAPNPROTO_SWIFT_PATH}")"
          git init "${CAPNPROTO_SWIFT_PATH}"
          git -C "${CAPNPROTO_SWIFT_PATH}" remote add origin "${CAPNPROTO_SWIFT_REPOSITORY}"
          git -C "${CAPNPROTO_SWIFT_PATH}" fetch --depth 1 origin "${CAPNPROTO_SWIFT_REF}"
          git -C "${CAPNPROTO_SWIFT_PATH}" checkout --detach FETCH_HEAD
          git -C "${CAPNPROTO_SWIFT_PATH}" submodule update --init --recursive --depth 1

          resolved_ref="$(git -C "${CAPNPROTO_SWIFT_PATH}" rev-parse HEAD)"
          if [[ "${resolved_ref}" != "${CAPNPROTO_SWIFT_REF}" ]]; then
            echo "Expected capnproto-swift ref ${CAPNPROTO_SWIFT_REF}, received ${resolved_ref}." >&2
            exit 1
          fi

          "${CAPNPROTO_SWIFT_PATH}/scripts/build-xcframework.sh"

      - name: Generate native Cap'n Proto artifacts
        env:
          CAPNPROTO_SWIFT_PATH: ${{ github.workspace }}/../../Work/capnproto-swift
          CAPNP_GENERATE_TS: "false"
        run: bash ./scripts/generate-capnp.sh

      - name: Select required Xcode
        shell: bash
        env:
          REQUIRED_XCODE_MAJOR: ${{ env.REQUIRED_XCODE_MAJOR }}
          REQUIRED_IOS_SDK_MAJOR: ${{ env.REQUIRED_IOS_SDK_MAJOR }}
        run: |
          set -euo pipefail

          shopt -s nullglob
          available_xcodes=(/Applications/Xcode*.app)

          if (( ${#available_xcodes[@]} == 0 )); then
            echo "No Xcode installations were found under /Applications." >&2
            exit 1
          fi

          matching_xcodes=(/Applications/Xcode_${REQUIRED_XCODE_MAJOR}*.app)
          selected_xcode_path=""

          if (( ${#matching_xcodes[@]} > 0 )); then
            selected_suffix="$(
              printf '%s\n' "${matching_xcodes[@]}" \
                | sed -E 's#^/Applications/Xcode_([0-9.]+)\.app$#\1#' \
                | sort -V \
                | tail -n 1
            )"
            selected_xcode_path="/Applications/Xcode_${selected_suffix}.app"
          elif [[ -d /Applications/Xcode.app ]]; then
            default_xcode_version="$(
              DEVELOPER_DIR=/Applications/Xcode.app/Contents/Developer \
                xcodebuild -version \
                | awk '/^Xcode / { print $2; exit }'
            )"
            default_xcode_major="${default_xcode_version%%.*}"

            if [[ "${default_xcode_major}" == "${REQUIRED_XCODE_MAJOR}" ]]; then
              selected_xcode_path="/Applications/Xcode.app"
            fi
          fi

          if [[ -z "${selected_xcode_path}" ]]; then
            echo "Xcode ${REQUIRED_XCODE_MAJOR}.x is required for App Store uploads, but this runner does not provide it." >&2
            printf 'Installed Xcode apps:\n%s\n' "${available_xcodes[*]}" >&2
            exit 1
          fi

          export DEVELOPER_DIR="${selected_xcode_path}/Contents/Developer"
          echo "DEVELOPER_DIR=${DEVELOPER_DIR}" >> "${GITHUB_ENV}"

          echo "Selected Xcode:"
          xcodebuild -version

          if ! xcodebuild -showsdks | grep -Eq "iphoneos${REQUIRED_IOS_SDK_MAJOR}"; then
            echo "Selected Xcode does not expose the iOS ${REQUIRED_IOS_SDK_MAJOR} SDK required for App Store uploads." >&2
            xcodebuild -showsdks >&2
            exit 1
          fi

      - name: Resolve Swift package dependencies
        run: xcodebuild -resolvePackageDependencies -project "${APP_PROJECT_PATH}" -scheme "${APP_SCHEME}"

      - name: Import App Store signing certificate
        uses: apple-actions/import-codesign-certs@95e84a1a18f2bdbc5c6ab9b7f4429372e4b13a8b
        with:
          p12-file-base64: ${{ secrets.IOS_APP_STORE_CERTIFICATE_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_APP_STORE_CERTIFICATE_PASSWORD }}

      - name: Download App Store provisioning profile
        id: provisioning
        uses: apple-actions/download-provisioning-profiles@3167792207a5b26099bc0ca22b5010a323dd2a0b
        with:
          bundle-id: ${{ env.APP_BUNDLE_ID }}
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}

      - name: Resolve App Store provisioning profile
        id: profile
        shell: bash
        env:
          APP_BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
          PROFILES_JSON: ${{ steps.provisioning.outputs.profiles }}
        run: |
          set -euo pipefail

          profile_name="$(
            ruby -rjson -e '
              profiles = JSON.parse(ENV.fetch("PROFILES_JSON"))

              if profiles.length != 1
                abort("Expected exactly one provisioning profile for #{ENV.fetch("APP_BUNDLE_ID")}, received #{profiles.length}.")
              end

              profile = profiles.first

              if profile.fetch("type") != "IOS_APP_STORE"
                abort("Expected an IOS_APP_STORE provisioning profile but received #{profile.fetch("type")}.")
              end

              print profile.fetch("name")
            '
          )"
          profile_uuid="$(
            ruby -rjson -e '
              profiles = JSON.parse(ENV.fetch("PROFILES_JSON"))
              print profiles.first.fetch("udid")
            '
          )"

          {
            printf 'name<<EOF\n%s\nEOF\n' "${profile_name}"
            echo "uuid=${profile_uuid}"
          } >> "${GITHUB_OUTPUT}"

      - name: Create export options
        env:
          EXPORT_OPTIONS_PLIST: ${{ runner.temp }}/ExportOptions.plist
          PROVISIONING_PROFILE_NAME: ${{ steps.profile.outputs.name }}
        run: |
          cat <<EOF > "${EXPORT_OPTIONS_PLIST}"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROVISIONING_PROFILE_NAME}</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APP_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

      - name: Archive release build
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/KayleID.xcarchive
          PROVISIONING_PROFILE_NAME: ${{ steps.profile.outputs.name }}
          # Append the workflow's run_attempt to CFBundleVersion so each re-run
          # of the same package version uploads as a fresh build (1.2.1.1,
          # 1.2.1.2, ...) instead of being rejected by App Store Connect for
          # duplicating CFBundleVersion. CFBundleShortVersionString stays at
          # the package.json marketing version.
          IOS_BUILD_NUMBER: ${{ github.run_attempt }}
        run: |
          xcodebuild archive \
            -project "${APP_PROJECT_PATH}" \
            -scheme "${APP_SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${ARCHIVE_PATH}" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="${APP_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="${APP_BUNDLE_ID}" \
            PROVISIONING_PROFILE_SPECIFIER="${PROVISIONING_PROFILE_NAME}" \
            IOS_BUILD_NUMBER="${IOS_BUILD_NUMBER}"

      - name: Verify archived SDK version
        shell: bash
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/KayleID.xcarchive
          REQUIRED_IOS_SDK_MAJOR: ${{ env.REQUIRED_IOS_SDK_MAJOR }}
        run: |
          set -euo pipefail

          app_info_plist="$(find "${ARCHIVE_PATH}/Products/Applications" -maxdepth 2 -name Info.plist -print -quit)"

          if [[ -z "${app_info_plist}" ]]; then
            echo "Could not locate the archived app Info.plist in ${ARCHIVE_PATH}." >&2
            exit 1
          fi

          sdk_name="$(/usr/libexec/PlistBuddy -c 'Print :DTSDKName' "${app_info_plist}")"
          xcode_build="$(/usr/libexec/PlistBuddy -c 'Print :DTXcodeBuild' "${app_info_plist}")"

          echo "Archived SDK: ${sdk_name}"
          echo "Xcode build: ${xcode_build}"

          if [[ "${sdk_name}" != iphoneos${REQUIRED_IOS_SDK_MAJOR}* ]]; then
            echo "The archived app was built with ${sdk_name}, but App Store uploads now require iphoneos${REQUIRED_IOS_SDK_MAJOR} or later." >&2
            exit 1
          fi

      - name: Export IPA
        env:
          ARCHIVE_PATH: ${{ runner.temp }}/KayleID.xcarchive
          EXPORT_OPTIONS_PLIST: ${{ runner.temp }}/ExportOptions.plist
          EXPORT_PATH: ${{ runner.temp }}/KayleIDExport
        run: |
          xcodebuild -exportArchive \
            -archivePath "${ARCHIVE_PATH}" \
            -exportPath "${EXPORT_PATH}" \
            -exportOptionsPlist "${EXPORT_OPTIONS_PLIST}"

      - name: Stage iOS build artifacts
        id: ios_assets
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
          ARCHIVE_PATH: ${{ runner.temp }}/KayleID.xcarchive
          EXPORT_OPTIONS_PLIST: ${{ runner.temp }}/ExportOptions.plist
          EXPORT_PATH: ${{ runner.temp }}/KayleIDExport
          STAGING_DIR: ${{ runner.temp }}/ios-build-artifacts
        run: |
          set -euo pipefail

          ipa_path="$(find "${EXPORT_PATH}" -maxdepth 1 -name '*.ipa' -print -quit)"

          if [[ -z "${ipa_path}" ]]; then
            echo "No IPA was exported to ${EXPORT_PATH}." >&2
            exit 1
          fi

          ipa_filename="KayleID-${APP_VERSION}.ipa"
          archive_filename="KayleID-${APP_VERSION}.xcarchive.zip"

          mkdir -p "${STAGING_DIR}"

          cp "${ipa_path}" "${STAGING_DIR}/${ipa_filename}"
          cp "${EXPORT_OPTIONS_PLIST}" "${STAGING_DIR}/ExportOptions.plist"
          ditto -c -k --keepParent "${ARCHIVE_PATH}" "${STAGING_DIR}/${archive_filename}"

          {
            echo "ipa_filename=${ipa_filename}"
            echo "archive_filename=${archive_filename}"
            echo "staging_dir=${STAGING_DIR}"
          } >> "${GITHUB_OUTPUT}"

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ios-build-artifacts
          path: ${{ steps.ios_assets.outputs.staging_dir }}/*
          if-no-files-found: error

  attest_release_artifacts:
    name: Attest Release Artifacts
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - preview_face_matcher
      - preview_api
      - preview_platform
      - preview_verify
      - build_ios
    if: >-
      always() &&
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.build_ios.result == 'success' &&
      (
        needs.preview_face_matcher.result == 'success' ||
        needs.preview_face_matcher.result == 'skipped'
      ) &&
      (
        needs.preview_api.result == 'success' ||
        needs.preview_api.result == 'skipped'
      ) &&
      (
        needs.preview_platform.result == 'success' ||
        needs.preview_platform.result == 'skipped'
      ) &&
      (
        needs.preview_verify.result == 'success' ||
        needs.preview_verify.result == 'skipped'
      )
    permissions:
      attestations: write
      id-token: write

    steps:
      - name: Download face matcher release package
        if: needs.detect_release.outputs.face_matcher == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: worker-face-matcher-package
          path: ${{ runner.temp }}/release-assets

      - name: Download API release package
        if: needs.detect_release.outputs.api == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: worker-api-package
          path: ${{ runner.temp }}/release-assets

      - name: Download platform release package
        if: needs.detect_release.outputs.platform == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: worker-platform-package
          path: ${{ runner.temp }}/release-assets

      - name: Download verify release package
        if: needs.detect_release.outputs.verify == 'true'
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: worker-verify-package
          path: ${{ runner.temp }}/release-assets

      - name: Download iOS build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: ios-build-artifacts
          path: ${{ runner.temp }}/release-assets

      - name: Create attested release assets
        id: assets
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
          RELEASE_TAG: ${{ needs.detect_release.outputs.release_tag }}
          TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          FORCE_FULL_RELEASE: ${{ needs.detect_release.outputs.force_full_release }}
          FACE_MATCHER_CHANGED: ${{ needs.detect_release.outputs.face_matcher_changed }}
          API_CHANGED: ${{ needs.detect_release.outputs.api_changed }}
          PLATFORM_CHANGED: ${{ needs.detect_release.outputs.platform_changed }}
          VERIFY_CHANGED: ${{ needs.detect_release.outputs.verify_changed }}
          FACE_MATCHER_DEPLOYED: ${{ needs.detect_release.outputs.face_matcher }}
          API_DEPLOYED: ${{ needs.detect_release.outputs.api }}
          PLATFORM_DEPLOYED: ${{ needs.detect_release.outputs.platform }}
          VERIFY_DEPLOYED: ${{ needs.detect_release.outputs.verify }}
        run: |
          set -euo pipefail

          release_assets_dir="${RUNNER_TEMP}/release-assets"
          manifest_path="${release_assets_dir}/kayle-id-release-${APP_VERSION}.json"
          checksums_path="${release_assets_dir}/kayle-id-release-${APP_VERSION}-checksums.txt"
          notes_path="${release_assets_dir}/kayle-id-release-${APP_VERSION}-notes.md"
          provenance_path="${release_assets_dir}/kayle-id-release-${APP_VERSION}-provenance.json"

          mkdir -p "${release_assets_dir}"

          ipa_filename="KayleID-${APP_VERSION}.ipa"
          xcarchive_filename="KayleID-${APP_VERSION}.xcarchive.zip"
          export_options_filename="ExportOptions.plist"

          for required_ios_asset in "${ipa_filename}" "${xcarchive_filename}" "${export_options_filename}"; do
            if [[ ! -f "${release_assets_dir}/${required_ios_asset}" ]]; then
              echo "Expected iOS release asset ${required_ios_asset} to exist." >&2
              exit 1
            fi
          done

          artifact_name_for() {
            local worker="$1"
            printf 'kayle-id-worker-%s-%s.tgz' "${worker}" "${APP_VERSION}"
          }

          require_artifact() {
            local artifact_path="$1"

            if [[ ! -f "${artifact_path}" ]]; then
              echo "Expected release artifact ${artifact_path} to exist." >&2
              exit 1
            fi
          }

          artifact_json_value() {
            local changed="$1"
            local artifact_name="$2"

            if [[ "${changed}" == "true" ]]; then
              printf '"%s"' "${artifact_name}"
            else
              printf 'null'
            fi
          }

          artifact_notes_value() {
            local changed="$1"
            local artifact_name="$2"

            if [[ "${changed}" == "true" ]]; then
              printf '%s' "${artifact_name}"
            else
              printf 'n/a'
            fi
          }

          face_matcher_artifact="$(artifact_name_for face-matcher)"
          api_artifact="$(artifact_name_for api)"
          platform_artifact="$(artifact_name_for platform)"
          verify_artifact="$(artifact_name_for verify)"

          worker_archives=()

          if [[ "${FACE_MATCHER_DEPLOYED}" == "true" ]]; then
            require_artifact "${release_assets_dir}/${face_matcher_artifact}"
            worker_archives+=("${face_matcher_artifact}")
          fi

          if [[ "${API_DEPLOYED}" == "true" ]]; then
            require_artifact "${release_assets_dir}/${api_artifact}"
            worker_archives+=("${api_artifact}")
          fi

          if [[ "${PLATFORM_DEPLOYED}" == "true" ]]; then
            require_artifact "${release_assets_dir}/${platform_artifact}"
            worker_archives+=("${platform_artifact}")
          fi

          if [[ "${VERIFY_DEPLOYED}" == "true" ]]; then
            require_artifact "${release_assets_dir}/${verify_artifact}"
            worker_archives+=("${verify_artifact}")
          fi

          checksum_targets=("${ipa_filename}" "${xcarchive_filename}" "${export_options_filename}")
          if (( ${#worker_archives[@]} > 0 )); then
            checksum_targets+=("${worker_archives[@]}")
          fi

          (
            cd "${release_assets_dir}"
            shasum -a 256 "${checksum_targets[@]}"
          ) > "${checksums_path}"

          cat <<EOF > "${manifest_path}"
          {
            "version": "${APP_VERSION}",
            "tag": "${RELEASE_TAG}",
            "commit": "${TARGET_SHA}",
            "releasedAt": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "forceFullRelease": ${FORCE_FULL_RELEASE},
            "releaseAssets": {
              "manifest": "$(basename "${manifest_path}")",
              "checksums": "$(basename "${checksums_path}")"
            },
            "workers": {
              "faceMatcher": {
                "changed": ${FACE_MATCHER_CHANGED},
                "deployed": ${FACE_MATCHER_DEPLOYED},
                "artifact": $(artifact_json_value "${FACE_MATCHER_DEPLOYED}" "${face_matcher_artifact}")
              },
              "api": {
                "changed": ${API_CHANGED},
                "deployed": ${API_DEPLOYED},
                "artifact": $(artifact_json_value "${API_DEPLOYED}" "${api_artifact}")
              },
              "platform": {
                "changed": ${PLATFORM_CHANGED},
                "deployed": ${PLATFORM_DEPLOYED},
                "artifact": $(artifact_json_value "${PLATFORM_DEPLOYED}" "${platform_artifact}")
              },
              "verify": {
                "changed": ${VERIFY_CHANGED},
                "deployed": ${VERIFY_DEPLOYED},
                "artifact": $(artifact_json_value "${VERIFY_DEPLOYED}" "${verify_artifact}")
              }
            },
            "ios": {
              "ipa": "${ipa_filename}",
              "xcarchive": "${xcarchive_filename}",
              "exportOptions": "${export_options_filename}"
            }
          }
          EOF

          cat <<EOF > "${notes_path}"
          Release version: ${APP_VERSION}
          Commit: ${TARGET_SHA}
          Force full worker release: ${FORCE_FULL_RELEASE}

          Production worker deployment
          - Face Matcher: changed=${FACE_MATCHER_CHANGED}, deployed=${FACE_MATCHER_DEPLOYED}, artifact=$(artifact_notes_value "${FACE_MATCHER_DEPLOYED}" "${face_matcher_artifact}")
          - API: changed=${API_CHANGED}, deployed=${API_DEPLOYED}, artifact=$(artifact_notes_value "${API_DEPLOYED}" "${api_artifact}")
          - Platform: changed=${PLATFORM_CHANGED}, deployed=${PLATFORM_DEPLOYED}, artifact=$(artifact_notes_value "${PLATFORM_DEPLOYED}" "${platform_artifact}")
          - Verify: changed=${VERIFY_CHANGED}, deployed=${VERIFY_DEPLOYED}, artifact=$(artifact_notes_value "${VERIFY_DEPLOYED}" "${verify_artifact}")

          iOS App Store
          - IPA: ${ipa_filename}
          - Archive: ${xcarchive_filename}
          - Export options: ${export_options_filename}

          Security assets
          - Release manifest: $(basename "${manifest_path}")
          - Artifact checksums: $(basename "${checksums_path}")
          EOF

          {
            echo "notes_path=${notes_path}"
            echo "provenance_path=${provenance_path}"
            echo "ipa_filename=${ipa_filename}"
          } >> "${GITHUB_OUTPUT}"

      - name: Attest release assets
        id: attest
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a
        with:
          subject-path: ${{ runner.temp }}/release-assets/*

      - name: Add provenance bundle to release assets
        shell: bash
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
          PROVENANCE_PATH: ${{ steps.assets.outputs.provenance_path }}
        run: cp "${BUNDLE_PATH}" "${PROVENANCE_PATH}"

      - name: Upload attested release assets
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets/*
          if-no-files-found: error

  deploy_face_matcher:
    name: Deploy Face Matcher
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - preview_face_matcher
      - attest_release_artifacts
    if: >-
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.detect_release.outputs.face_matcher == 'true' &&
      needs.preview_face_matcher.result == 'success' &&
      needs.attest_release_artifacts.result == 'success'
    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Download attested release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets

      - name: Extract face matcher deploy artifact
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          archive_path="${RUNNER_TEMP}/release-assets/kayle-id-worker-face-matcher-${APP_VERSION}.tgz"
          deploy_dir="${RUNNER_TEMP}/deploy-face-matcher"

          if [[ ! -f "${archive_path}" ]]; then
            echo "Missing attested face matcher artifact ${archive_path}." >&2
            exit 1
          fi

          mkdir -p "${deploy_dir}"
          tar -xzf "${archive_path}" -C "${deploy_dir}"

      - name: Deploy face matcher worker to production
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler deploy \
            --config "${RUNNER_TEMP}/deploy-face-matcher/workspace/infra/face-matcher/wrangler.deploy.jsonc" \
            --no-bundle \
            --env production

  deploy_api:
    name: Deploy API
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - preview_api
      - attest_release_artifacts
      - deploy_face_matcher
    if: >-
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.detect_release.outputs.api == 'true' &&
      needs.preview_api.result == 'success' &&
      needs.attest_release_artifacts.result == 'success' &&
      (
        needs.deploy_face_matcher.result == 'success' ||
        needs.deploy_face_matcher.result == 'skipped'
      )
    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Download attested release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets

      - name: Extract API deploy artifact
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          archive_path="${RUNNER_TEMP}/release-assets/kayle-id-worker-api-${APP_VERSION}.tgz"
          deploy_dir="${RUNNER_TEMP}/deploy-api"

          if [[ ! -f "${archive_path}" ]]; then
            echo "Missing attested API artifact ${archive_path}." >&2
            exit 1
          fi

          mkdir -p "${deploy_dir}"
          tar -xzf "${archive_path}" -C "${deploy_dir}"

      - name: Deploy API worker to production
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler deploy \
            --config "${RUNNER_TEMP}/deploy-api/workspace/apps/api/wrangler.deploy.jsonc" \
            --no-bundle \
            --env production

  deploy_platform:
    name: Deploy Platform
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - preview_platform
      - attest_release_artifacts
      - deploy_api
    if: >-
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.detect_release.outputs.platform == 'true' &&
      needs.preview_platform.result == 'success' &&
      needs.attest_release_artifacts.result == 'success' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )
    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Download attested release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets

      - name: Extract platform deploy artifact
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          archive_path="${RUNNER_TEMP}/release-assets/kayle-id-worker-platform-${APP_VERSION}.tgz"
          deploy_dir="${RUNNER_TEMP}/deploy-platform"

          if [[ ! -f "${archive_path}" ]]; then
            echo "Missing attested platform artifact ${archive_path}." >&2
            exit 1
          fi

          mkdir -p "${deploy_dir}"
          tar -xzf "${archive_path}" -C "${deploy_dir}"

      - name: Deploy platform worker to production
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler deploy \
            --config "${RUNNER_TEMP}/deploy-platform/workspace/apps/platform/wrangler.deploy.jsonc" \
            --no-bundle

  deploy_verify:
    name: Deploy Verify
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - preview_verify
      - attest_release_artifacts
      - deploy_api
    if: >-
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.detect_release.outputs.verify == 'true' &&
      needs.preview_verify.result == 'success' &&
      needs.attest_release_artifacts.result == 'success' &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      )
    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun

      - name: Download attested release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets

      - name: Extract verify deploy artifact
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          archive_path="${RUNNER_TEMP}/release-assets/kayle-id-worker-verify-${APP_VERSION}.tgz"
          deploy_dir="${RUNNER_TEMP}/deploy-verify"

          if [[ ! -f "${archive_path}" ]]; then
            echo "Missing attested verify artifact ${archive_path}." >&2
            exit 1
          fi

          mkdir -p "${deploy_dir}"
          tar -xzf "${archive_path}" -C "${deploy_dir}"

      - name: Deploy verify worker to production
        shell: bash
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler deploy \
            --config "${RUNNER_TEMP}/deploy-verify/workspace/apps/verify/wrangler.deploy.jsonc" \
            --no-bundle \
            --env production

  upload_app_store:
    name: Upload iOS to App Store Connect
    runs-on: macos-15
    needs:
      - detect_release
      - attest_release_artifacts
    if: >-
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.attest_release_artifacts.result == 'success'
    timeout-minutes: 30

    steps:
      - name: Download attested release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets

      - name: Locate attested IPA
        id: ipa
        shell: bash
        env:
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
        run: |
          set -euo pipefail

          ipa_path="${RUNNER_TEMP}/release-assets/KayleID-${APP_VERSION}.ipa"

          if [[ ! -f "${ipa_path}" ]]; then
            echo "Missing attested IPA at ${ipa_path}." >&2
            exit 1
          fi

          echo "path=${ipa_path}" >> "${GITHUB_OUTPUT}"

      - name: Create App Store Connect API key
        env:
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          install -d -m 700 "${API_PRIVATE_KEYS_DIR}"
          cat <<EOF > "${API_PRIVATE_KEYS_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          ${APP_STORE_CONNECT_PRIVATE_KEY}
          EOF
          chmod 600 "${API_PRIVATE_KEYS_DIR}/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"

      - name: Upload IPA to App Store Connect
        env:
          API_PRIVATE_KEYS_DIR: ${{ runner.temp }}/private_keys
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          xcrun altool \
            --upload-app \
            --type ios \
            --file "${{ steps.ipa.outputs.path }}" \
            --apiIssuer "${APP_STORE_CONNECT_ISSUER_ID}" \
            --apiKey "${APP_STORE_CONNECT_KEY_ID}"

  publish_release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - detect_release
      - attest_release_artifacts
      - deploy_face_matcher
      - deploy_api
      - deploy_platform
      - deploy_verify
      - upload_app_store
    if: >-
      always() &&
      needs.detect_release.outputs.release_allowed == 'true' &&
      needs.attest_release_artifacts.result == 'success' &&
      needs.upload_app_store.result == 'success' &&
      (
        needs.deploy_face_matcher.result == 'success' ||
        needs.deploy_face_matcher.result == 'skipped'
      ) &&
      (
        needs.deploy_api.result == 'success' ||
        needs.deploy_api.result == 'skipped'
      ) &&
      (
        needs.deploy_platform.result == 'success' ||
        needs.deploy_platform.result == 'skipped'
      ) &&
      (
        needs.deploy_verify.result == 'success' ||
        needs.deploy_verify.result == 'skipped'
      )
    permissions:
      contents: write

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Download attested release assets
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-assets
          path: ${{ runner.temp }}/release-assets

      - name: Ensure release tag exists
        env:
          RELEASE_TAG: ${{ needs.detect_release.outputs.release_tag }}
          TARGET_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
        run: |
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1 || \
            git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${TARGET_SHA}" -m "Kayle ID ${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          APP_VERSION: ${{ needs.detect_release.outputs.app_version }}
          RELEASE_TAG: ${{ needs.detect_release.outputs.release_tag }}
        shell: bash
        run: |
          set -euo pipefail

          notes_path="${RUNNER_TEMP}/release-assets/kayle-id-release-${APP_VERSION}-notes.md"
          release_assets_dir="${RUNNER_TEMP}/release-assets"
          asset_paths=(
            "${release_assets_dir}/kayle-id-release-${APP_VERSION}.json"
            "${release_assets_dir}/kayle-id-release-${APP_VERSION}-checksums.txt"
            "${release_assets_dir}/kayle-id-release-${APP_VERSION}-provenance.json"
            "${release_assets_dir}/KayleID-${APP_VERSION}.ipa"
            "${release_assets_dir}/KayleID-${APP_VERSION}.xcarchive.zip"
            "${release_assets_dir}/ExportOptions.plist"
          )

          shopt -s nullglob
          worker_archives=("${release_assets_dir}"/kayle-id-worker-*.tgz)

          if (( ${#worker_archives[@]} > 0 )); then
            asset_paths+=("${worker_archives[@]}")
          fi

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            mapfile -t existing_asset_names < <(gh release view "${RELEASE_TAG}" --json assets --jq '.assets[].name')
            missing_asset_paths=()
            missing_asset_names=()

            release_has_asset() {
              local asset_name="${1}"

              for existing_asset_name in "${existing_asset_names[@]}"; do
                if [[ "${existing_asset_name}" == "${asset_name}" ]]; then
                  return 0
                fi
              done

              return 1
            }

            for asset_path in "${asset_paths[@]}"; do
              asset_name="$(basename "${asset_path}")"

              if ! release_has_asset "${asset_name}"; then
                missing_asset_paths+=("${asset_path}")
                missing_asset_names+=("${asset_name}")
              fi
            done

            if (( ${#missing_asset_paths[@]} == 0 )); then
              exit 0
            fi

            is_immutable="$(gh release view "${RELEASE_TAG}" --json isImmutable --jq '.isImmutable')"
            if [[ "${is_immutable}" == "true" ]]; then
              printf 'Immutable release %s already exists but is missing required assets: %s\n' \
                "${RELEASE_TAG}" "${missing_asset_names[*]}" >&2
              echo "Delete the incomplete release and rerun, or publish a new version/tag." >&2
              exit 1
            fi

            gh release upload "${RELEASE_TAG}" "${missing_asset_paths[@]}" --clobber
            exit 0
          fi

          gh release create "${RELEASE_TAG}" "${asset_paths[@]}" \
            --title "Kayle ID ${APP_VERSION}" \
            --notes-file "${notes_path}" \
            --verify-tag
