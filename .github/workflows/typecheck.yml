name: Typecheck

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    name: ${{ matrix.workspace }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: API
            working-directory: apps/api
            generate-capnp: "true"
          - workspace: Platform
            working-directory: apps/platform
            generate-capnp: "false"
          - workspace: Verify
            working-directory: apps/verify
            generate-capnp: "true"
          - workspace: Biometric Verifier
            working-directory: apps/biometric-verifier
            generate-capnp: "false"
          - workspace: Auth
            working-directory: packages/auth
            generate-capnp: "false"
          - workspace: Capnp
            working-directory: packages/capnp
            generate-capnp: "true"
          - workspace: Config
            working-directory: packages/config
            generate-capnp: "false"
          - workspace: Database
            working-directory: packages/database
            generate-capnp: "false"
          - workspace: Emails
            working-directory: packages/emails
            generate-capnp: "false"
          - workspace: Translations
            working-directory: packages/translations
            generate-capnp: "false"
          - workspace: Trust Store
            working-directory: packages/trust-store
            generate-capnp: "false"
          - workspace: UI
            working-directory: packages/ui
            generate-capnp: "false"

    steps:
      - name: Check out repository code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Set up Bun workspace
        uses: ./.github/actions/setup-bun
        with:
          generate-capnp-ts: ${{ matrix.generate-capnp }}

      - name: Typecheck
        working-directory: ${{ matrix.working-directory }}
        run: bun run typecheck
