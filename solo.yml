name: kayle-id
icon: apps/platform/public/android-chrome-512x512.png
processes:
  Redis:
    command: ./infra/redis/launch.sh
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Biometric Verifier:
    command: ./scripts/dev-with-healthcheck.sh
    working_dir: ./apps/biometric-verifier
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Emails:
    command: bun run dev
    working_dir: ./packages/emails
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Studio:
    command: bun drizzle-kit studio
    working_dir: ./packages/database
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Seed:
    command: infisical run --env=dev -- bun run dev:seed -- --objects ./temp/icao-pkd-objects.ldif --master-lists ./temp/icao-pkd-master-lists.ldif --output ./temp/icao-pkd-trust-store.sql
    working_dir: ./
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Docs:
    command: bunx mint dev
    working_dir: ./docs
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  iOS (Production):
    command: bash ./apps/ios/scripts/run-on-connected-device.sh --api-base-url https://api.kayle.id
    working_dir: ./
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env:
      IOS_DEVICE_IDENTIFIER: ''
  iOS (Staging):
    command: bash ./apps/ios/scripts/run-on-connected-device.sh --api-base-url https://api.staging.kayle.id
    working_dir: ./
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env:
      IOS_DEVICE_IDENTIFIER: ''
  Seed (Production):
    command: infisical run --env=prod -- bun run prod:seed:pkd -- --objects ./temp/icao-pkd-objects.ldif --master-lists ./temp/icao-pkd-master-lists.ldif --output ./temp/icao-pkd-trust-store.sql
    working_dir: ./
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  Platform:
    command: bun run dev
    working_dir: ./apps/platform
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Database:
    command: ./infra/postgres/launch.sh
    working_dir: null
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  API:
    command: bun run dev
    working_dir: ./apps/api
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Verify:
    command: bun run dev
    working_dir: ./apps/verify
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  Debugger:
    command: bun run dev
    working_dir: ./apps/debugger
    auto_start: false
    auto_restart: true
    restart_when_changed: []
    env: {}
  iOS (Local):
    command: infisical run --env=dev -- bash ./apps/ios/scripts/run-on-connected-device.sh
    working_dir: ./
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env:
      IOS_DEVICE_IDENTIFIER: ''
